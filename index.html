<html>
    <head>
        <title>Web Development</title>
        <style>
            .container1 {
                display: grid;
                grid-template-columns: 100px minmax(100px, auto) 100px;
                font-size: 12pt;
            }

            .container2 {
                display: grid;
                grid-template-rows: 100px 100px auto;
                font-size: 12pt;
                height: 400px;
            }

            .col1
            {
                background-color: aqua;
            }
            .col2
            {
                background-color: blueviolet;
                color: #FFFFFF;
            }
            .col3
            {
                background-color: crimson;
                color: #FFFFFF;
            }
            .row1
            {
                background-color: chartreuse;
            }
            .row2
            {
                background-color: darkorange;
            }
            .row3
            {
                background-color: hotpink;
            }
        </style>
    </head>
    <body>
        <h1>Web Development</h1>
        <div class="container1">
            <div class="col1">1 - 100%</div>
            <div class="col2">2- Min: 100px, Max: Auto</div>
            <div class="col3">3 - 100%</div>
        </div>
        <br/><br/>
        <div class="container2">
            <div class="row1">row1 - 100px</div>
            <div class="row2">row2 - 100px</div>
            <div class="row3">row3 - auto</div>
        </div>
    </body>
</html>
