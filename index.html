<html>
    <head>
        <title>Web Development</title>
        <style>
            .container1 {
                display: grid;
                grid-template-columns: 100px minmax(100px, auto) 100px;
                font-size: 12pt;
            }

            .container2 {
                display: grid;
                grid-template-rows: 100px 100px minmax(100px, auto);
                font-size: 12pt;
                height: 100%;
            }

            .col1
            {
                background-color: aqua;
            }
            .col2
            {
                background-color: blueviolet;
                color: #FFFFFF;
            }
            .col3
            {
                background-color: crimson;
                color: #FFFFFF;
            }
            .row1
            {
                background-color: chartreuse;
            }
            .row2
            {
                background-color: darkorange;
            }
            .row3
            {
                background-color: hotpink;
                align-content: end;
            }
        </style>
    </head>
    <body>
        <h1>Web Development</h1>
        <a href="gridcols.html">Grid Cols</a>
        <a href="gridrows.html">Grid Rows</a><br/>
    </body>
</html>
