<html>
    <head>
        <title>Web Development</title>
        <style>
            .container2 {
                display: grid;
                grid-template-rows: repeat(3, 100px) minmax(100px, auto);
                grid-row-gap: 0px;
                font-size: 12pt;
                height: 100%;
            }
            .col1
            {
                background-color: aqua;
            }
            .col2
            {
                background-color: blueviolet;
                color: #FFFFFF;
            }
            .col3
            {
                background-color: crimson;
                color: #FFFFFF;
            }
            .row1
            {
                background-color: chartreuse;
            }
            .row2
            {
                background-color: darkorange;
            }
            .row3
            {
                background-color: goldenrod;
            }
            .row4
            {
                background-color: hotpink;
                align-content: end;
            }
        </style>
    </head>
    <body>
        <div class="container2">
            <div class="row1">row1 - 100px</div>
            <div class="row2">row2 - 100px</div>
            <div class="row3">row3 - 100px</div>
            <div class="row4">row4 - Min: 100px, Max: Auto</div>
        </div>
    </body>
</html>
