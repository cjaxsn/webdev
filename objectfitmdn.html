<html>
    <head>
        <title>Responsive Profile</title>
        <style>
            h2 {
                font-family: "Courier New", monospace;
                font-size: 1em;
                margin: 1em 0 0.3em;
            }

            img {
            width: 150px;
            height: 100px;
            border: 1px solid black;
            margin: 10px 0;
            }

            .narrow {
            width: 100px;
            height: 150px;
            }

            .fill {
            object-fit: fill;
            }

            .contain {
            object-fit: contain;
            }

            .cover {
            object-fit: cover;
            }

            .none {
            object-fit: none;
            }

            .scale-down {
            object-fit: scale-down;
            }
        </style>
    </head>
    <body>
        <section>
            <h2>object-fit: fill</h2>
            <img class="fill" src="images/woman1.webp" alt="MDN Logo" />
          
            <img class="fill narrow" src="images/woman1.webp" alt="MDN Logo" />
          
            <h2>object-fit: contain</h2>
            <img class="contain" src="images/woman1.webp" alt="MDN Logo" />
          
            <img class="contain narrow" src="images/woman1.webp" alt="MDN Logo" />
          
            <h2>object-fit: cover</h2>
            <img class="cover" src="images/woman1.webp" alt="MDN Logo" />
          
            <img class="cover narrow" src="images/woman1.webp" alt="MDN Logo" />
          
            <h2>object-fit: none</h2>
            <img class="none" src="images/woman1.webp" alt="MDN Logo" />
          
            <img class="none narrow" src="images/woman1.webp" alt="MDN Logo" />
          
            <h2>object-fit: scale-down</h2>
            <img class="scale-down" src="images/woman1.webp" alt="MDN Logo" />
          
            <img class="scale-down narrow" src="images/woman1.webp" alt="MDN Logo" />
          </section>
    </body>
</html>
