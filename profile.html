<html>
    <head>
        <title>Responsive Profile</title>
        <style>
            .container
            {
                display: grid;
                grid-template-rows: 25px minmax(400px, auto) 300px 100px;
                grid-row-gap: 0px;
                font-size: 12pt;
            }
            div.photo
            {
                width: 100%;
                height: 400px;
                border: 1px solid black;
            }
            img.profile
            {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="name">Name: Leah</div>
            <div class="photo">
                <img class="profile" src="images/woman1.webp"/>
            </div>
            <div class="details">Details</div>
            <div class="row4">Row 4</div>
        </div>
    </body>
</html>
