<html>
    <head>
        <title>Web Development</title>
        <style>
            .container1 {
                display: grid;
                grid-template-columns: 100px minmax(100px, auto) 100px;
                font-size: 12pt;
            }
            .col1
            {
                background-color: aqua;
            }
            .col2
            {
                background-color: blueviolet;
                color: #FFFFFF;
            }
            .col3
            {
                background-color: crimson;
                color: #FFFFFF;
            }
        </style>
    </head>
    <body>
        <h1>CSS Grid Columns</h1>
        
        <div class="container1">
            <div class="col1">1 - 100%</div>
            <div class="col2">2- Min: 100px, Max: Auto</div>
            <div class="col3">3 - 100%</div>
        </div>
    </body>
</html>
